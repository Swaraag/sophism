services:
  - type: web
    name: sophism-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: ASSEMBLYAI_API_KEY
        sync: false        # set manually in Render dashboard
    plan: free
